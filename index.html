<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震情報</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @font-face {
            font-family: 'UDKakugo';
            src: url('assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'UDKakugo', sans-serif;
            background-color: #0d1b2a;
            overflow: hidden;
            user-select: none;
        }

        /* 16:9 画面比率の固定コンテナ（スクショ用） */
        #display-container {
            position: relative;
            width: 1920px;
            height: 1080px;
            transform-origin: top left;
        }

        /* 地図の背景色を変更 */
        #map {
            width: 100%;
            height: 100%;
            background: #143264;
        }

        /* 上部ヘッダー（back.svgを横幅100%の背景として表示） */
        #header-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 190px;
            background-image: url('assets/back.svg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 1000;
        }

        /* 左上 震度バナーエリア */
        #max-intensity-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 490px;
            height: 156px;
            background-size: contain;
            background-repeat: no-repeat;
        }

        /* -------------------------------------------
           【個別調整エリア】文字の位置・サイズを自由に変更できます
           ------------------------------------------- */
        .info-text-base {
            position: absolute;
            color: #ffffff;
            font-weight: 400;
            white-space: nowrap;
        }

        /* 発生時刻 */
        #val-time {
            font-size: 46px;
            left: 630px;
            top: 0px;
        }

        /* 震源 */
        #val-hypocenter {
            font-size: 46px;
            left: 630px;
            top: 68px;
        }

        /* 規模 (マグニチュード) */
        #val-magnitude {
            font-size: 46px;
            left: 1228px;
            top: 0px;
        }

        /* 深さ */
        #val-depth {
            font-size: 46px;
            left: 1228px;
            top: 68px;
        }

        /* 右上 ステータスバナーエリア */
        #status-banners {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .banner-row {
            display: flex;
            gap: 8px;
        }

        .status-banner {
            height: 55px;
            object-fit: contain;
            transition: opacity 0.3s ease;
        }

        /* 非表示状態でも透明度0.1でうっすら表示させるスタイル */
        .status-banner.dimmed {
            opacity: 0.1 !important;
        }

        /* カスタムアイコンスタイル */
        .intensity-icon {
            background: none;
            border: none;
        }
        .intensity-icon img {
            width: 50px;
            height: 50px;
        }

        /* 震源地アイコン（shingen.png用） */
        .epicenter-icon {
            background: none;
            border: none;
        }
        .epicenter-icon img {
            width: 60px;
            height: 60px;
        }
    </style>
</head>
<body>

<div id="display-container">
    <div id="map"></div>

    <div id="header-container">
        <div id="max-intensity-banner"></div>
        
        <div id="val-time" class="info-text-base">--日 --時--分ごろ</div>
        <div id="val-hypocenter" class="info-text-base">調査中</div>
        <div id="val-magnitude" class="info-text-base">--</div>
        <div id="val-depth" class="info-text-base">--</div>

        <div id="status-banners">
            <img id="banner-tsunami" class="status-banner" src="assets/banner/t2.svg" alt="津波情報">
            
            <div class="banner-row">
                <img id="banner-eew" class="status-banner dimmed" src="assets/banner/eew.svg" alt="EEW">
                <img id="banner-enchi" class="status-banner dimmed" src="assets/banner/enchi.svg" alt="遠地">
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 画面のリサイズ対応（1920x1080を基準に等倍スケーリング）
    function resizeDisplay() {
        const container = document.getElementById('display-container');
        const scaleX = window.innerWidth / 1920;
        const scaleY = window.innerHeight / 1080;
        const scale = Math.min(scaleX, scaleY);
        container.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeDisplay);
    resizeDisplay();

    // Leafletマップ初期化
    const map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        minZoom: 2,
        maxZoom: 10
    }).setView([36.5, 138.0], 5);

    const intensityMap = {
        "10": { banner: "b1.svg", icon: "s1.svg" },
        "20": { banner: "b2.svg", icon: "s2.svg" },
        "30": { banner: "b3.svg", icon: "s3.svg" },
        "40": { banner: "b4.svg", icon: "s4.svg" },
        "45": { banner: "b5m.svg", icon: "s5m.svg" },
        "50": { banner: "b5p.svg", icon: "s5p.svg" },
        "55": { banner: "b6m.svg", icon: "s6m.svg" },
        "60": { banner: "b6p.svg", icon: "s6p.svg" },
        "70": { banner: "b7.svg", icon: "s7.svg" }
    };

    const tsunamiMap = {
        "None": "t2.svg",
        "Unknown": "t1.svg",
        "Checking": "t1.svg",
        "NonEffective": "t3.svg",
        "Watch": "t4.svg",
        "Warning": "t4.svg"
    };

    let saibunLayer, prefLayer, shionumaLayer;
    let saibunFeatures = {};
    let shingenMaster = {};    // 震央CSVマスタ
    let cityToSaibunMap = {};  // 震度観測点CSVマスタ

    // 震央CSVを解析する関数
    function parseShingenCSV(csvText) {
        const lines = csvText.split(/\r?\n/);
        const result = {};
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            const cols = lines[i].split(',');
            if (cols.length >= 2) {
                const name = cols[0].trim();
                const isTrue = cols[1].trim().toUpperCase() === 'TRUE';
                result[name] = isTrue;
            }
        }
        return result;
    }

    // 震度観測点CSVを解析する関数
    function parseObservationCSV(csvText) {
        const lines = csvText.split(/\r?\n/);
        const result = {};
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            const cols = lines[i].split(',');
            if (cols.length >= 2) {
                const saibunName = cols[0].trim();
                const cityName = cols[1].trim();
                result[cityName] = saibunName;
            }
        }
        return result;
    }

    async function loadGeoJSON() {
        try {
            const csvRes = await fetch('assets/震央.csv');
            const csvText = await csvRes.text();
            shingenMaster = parseShingenCSV(csvText);
        } catch (e) {
            console.error("震央CSVの読み込みに失敗しました:", e);
        }

        try {
            const obsRes = await fetch('assets/震度観測点.csv');
            const obsText = await obsRes.text();
            cityToSaibunMap = parseObservationCSV(obsText);
        } catch (e) {
            console.error("震度観測点CSVの読み込みに失敗しました:", e);
        }

        try {
            const saibunRes = await fetch('assets/map/saibun.json');
            const saibunData = await saibunRes.json();
            
            saibunData.features.forEach(f => {
                if (f.properties && f.properties.name) {
                    saibunFeatures[f.properties.name] = f;
                }
            });

            saibunLayer = L.geoJSON(saibunData, {
                style: { color: "#A6A6A6", weight: 0.8, fillColor: "#BFBFBF", fillOpacity: 1.0 }
            }).addTo(map);

            const prefRes = await fetch('assets/map/pref.json');
            const prefData = await prefRes.json();
            prefLayer = L.geoJSON(prefData, {
                style: { color: "#595959", weight: 1.8, fillColor: "none", fillOpacity: 0 }
            }).addTo(map);

            const shionumaRes = await fetch('assets/map/shionuma.json');
            const shionumaData = await shionumaRes.json();
            shionumaLayer = L.geoJSON(shionumaData, {
                style: { color: "none", weight: 0, fillColor: "#143264", fillOpacity: 1.0 }
            }).addTo(map);

        } catch (e) {
            console.error("GeoJSONの読み込みに失敗しました:", e);
        }
    }

    function getFeatureCenter(feature) {
        if (feature.geometry.type === "Point") {
            return [feature.geometry.coordinates[1], feature.geometry.coordinates[0]];
        }
        const tempLayer = L.geoJSON(feature);
        const center = tempLayer.getBounds().getCenter();
        return [center.lat, center.lng];
    }

    // 市町村名から細分区域名へと変換する関数（誤判定・過剰マッチ完全対策版）
    function convertToSaibunName(addrName) {
        if (!addrName) return null;

        // 【安全化1】P2Pから送られてくる文字列がマスタの都市名（例：「さいたま市緑区」など）と完全に等しい、
        // もしくは「後ろから部分一致」するかを厳密に精査。
        // 単に「includes」だと、「秋田市」が「◯◯市秋田町」等に誤反応するのを防ぐため、文字数ベースで確実なもののみ抽出。
        
        // 1. マスタの中に「送られてきた文字列そのもの」または「市町村名レベルで完全一致」するものがあるか
        if (cityToSaibunMap[addrName]) {
            return cityToSaibunMap[addrName];
        }

        // 2. 「◯◯県◯◯市」のような形式から安全に末尾の市町村区を切り出し
        const match = addrName.match(/^.*?[市町村区]+/);
        const baseCityName = match ? match[0] : addrName;

        if (cityToSaibunMap[baseCityName]) {
            return cityToSaibunMap[baseCityName];
        }

        // 3. ループ処理による部分一致は、誤反応の元になるため「マスタのキー（市町村名）が、送られてきた文字列の末尾にきれいにフィットするか」で厳格に判定
        for (const cityKey in cityToSaibunMap) {
            if (addrName.endsWith(cityKey) || baseCityName === cityKey) {
                return cityToSaibunMap[cityKey];
            }
        }

        return null;
    }

    async function fetchQuakeData() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const apiUrl = "https://api.p2pquake.net/v2/history?codes=551&limit=30";
        
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            if (!data || data.length === 0) return;

            let eq = data[0];
            if (targetId) {
                const found = data.find(item => item.id === targetId);
                if (found) eq = found;
            }

            await renderEarthquake(eq);
        } catch (e) {
            console.error("APIの取得に失敗しました:", e);
        }
    }

    async function checkEEW(targetTimeStr) {
        if (!targetTimeStr) return false;
        try {
            const eewRes = await fetch("https://api.p2pquake.net/v2/history?codes=556&limit=10");
            const eewData = await eewRes.json();
            if (!eewData || eewData.length === 0) return false;

            const targetMinute = targetTimeStr.substring(0, 16);
            return eewData.some(eew => {
                if (eew.earthquake && eew.earthquake.originTime) {
                    const eewMinute = eew.earthquake.originTime.substring(0, 16);
                    return targetMinute === eewMinute;
                }
                return false;
            });
        } catch (err) {
            console.error("EEWデータの取得・判定に失敗しました:", err);
            return false;
        }
    }

    async function renderEarthquake(eq) {
        const earth = eq.earthquake;
        const points = eq.points || [];
        const hypocenterName = earth.hypocenter.name || "震源不詳";

        let boundsPoints = [];

        if (earth.time) {
            const t = earth.time.split(' ');
            if (t.length >= 2) {
                const dateParts = t[0].split('/');
                const timeParts = t[1].split(':');
                document.getElementById('val-time').innerText = `${dateParts[2]}日 ${timeParts[0]}時${timeParts[1]}分ごろ`;
            }
        }
        
        document.getElementById('val-hypocenter').innerText = hypocenterName;
        document.getElementById('val-magnitude').innerText = earth.hypocenter.magnitude === -1 ? "Ｍ不定" : `Ｍ${earth.hypocenter.magnitude}`;
        
        let depthStr = "ごく浅い";
        if (earth.hypocenter.depth > 0) depthStr = `約${earth.hypocenter.depth}km`;
        if (earth.hypocenter.depth === -1) depthStr = "深さ不明";
        document.getElementById('val-depth').innerText = depthStr;

        const maxInt = earth.maxScale;
        const bannerContainer = document.getElementById('max-intensity-banner');
        if (intensityMap[maxInt]) {
            bannerContainer.style.backgroundImage = `url('assets/banner/${intensityMap[maxInt].banner}')`;
        } else {
            bannerContainer.style.backgroundImage = `url('assets/banner/b0.svg')`;
        }

        const tsunamiDom = document.getElementById('banner-tsunami');
        const domesticTsunami = earth.domesticTsunami || "None";
        if (tsunamiMap[domesticTsunami]) {
            tsunamiDom.src = `assets/banner/${tsunamiMap[domesticTsunami]}`;
        }

        const enchiDom = document.getElementById('banner-enchi');
        const isEnchi = shingenMaster[hypocenterName] === true || hypocenterName.includes("遠地") || domesticTsunami === "Checking" || maxInt === 0;

        if (isEnchi) {
            enchiDom.classList.remove('dimmed');
        } else {
            enchiDom.classList.add('dimmed');
        }

        const eewDom = document.getElementById('banner-eew');
        const hasEEW = await checkEEW(earth.time);
        if (hasEEW) {
            eewDom.classList.remove('dimmed');
        } else {
            eewDom.classList.add('dimmed');
        }

        if (earth.hypocenter.latitude !== -1 && earth.hypocenter.longitude !== -1) {
            const epiLat = earth.hypocenter.latitude;
            const epiLng = earth.hypocenter.longitude;
            boundsPoints.push([epiLat, epiLng]);

            const epicenterIcon = L.divIcon({
                className: 'epicenter-icon',
                html: `<img src="assets/icons/shingen.png" alt="震源地">`,
                iconSize: [60, 60],
                iconAnchor: [30, 30]
            });
            L.marker([epiLat, epiLng], { icon: epicenterIcon }).addTo(map);
        }

        const saibunMaxScale = {};

        points.forEach(p => {
            const addrName = p.addr;
            const scale = p.scale;
            const saibunName = convertToSaibunName(addrName);

            if (saibunName && saibunFeatures[saibunName]) {
                if (!saibunMaxScale[saibunName] || scale > saibunMaxScale[saibunName]) {
                    saibunMaxScale[saibunName] = scale;
                }
            }
        });

        for (const saibunName in saibunMaxScale) {
            const finalScale = saibunMaxScale[saibunName];
            
            if (intensityMap[finalScale]) {
                const center = getFeatureCenter(saibunFeatures[saibunName]);
                boundsPoints.push(center);

                const iconPath = `assets/icons/${intensityMap[finalScale].icon}`;
                const icon = L.divIcon({
                    className: 'intensity-icon',
                    html: `<img src="${iconPath}" alt="震度${finalScale}">`,
                    iconSize: [50, 50],
                    iconAnchor: [25, 25]
                });

                L.marker(center, { icon: icon }).addTo(map);
            }
        }

        // 自動ズーム
        if (isEnchi) {
            map.setView([20, 140], 3);
        } else if (boundsPoints.length > 0) {
            const bounds = L.latLngBounds(boundsPoints);
            map.fitBounds(bounds, {
                paddingTopLeft: [50, 220],
                paddingBottomRight: [50, 50],
                maxZoom: 8
            });
        }
    }

    async function init() {
        await loadGeoJSON();
        await fetchQuakeData();
    }

    init();
</script>
</body>
</html>
