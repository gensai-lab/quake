<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震情報</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @font-face {
            font-family: 'UDKakugo';
            /* フォントファイルを FOT-UDKakugo_LargePr6-M.otf に変更 */
            src: url('assets/fonts/FOT-UDKakugo_LargePr6-M.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'UDKakugo', sans-serif;
            background-color: #0d1b2a;
            overflow: hidden;
            user-select: none;
        }

        /* 16:9 画面比率の固定コンテナ */
        #display-container {
            position: relative;
            width: 1920px;
            height: 1080px;
            transform-origin: top left;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #143264;
        }

        #header-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 189px;
            background-image: url('assets/back.svg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 1000;
        }

        #max-intensity-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 490px;
            height: 156px;
            background-size: contain;
            background-repeat: no-repeat;
        }

        .info-text-base {
            position: absolute;
            color: #ffffff;
            font-weight: 400;
            white-space: nowrap;
            letter-spacing: 0.03em; /* 文字間隔を3%に設定 */
        }

        /* 「日」「時」「分ごろ」「約」の文字サイズを小さくする用 */
        .unit-text {
            font-size: 0.75em; /* 元の文字サイズ(46px)の約75%の大きさに縮小 */
            margin-left: 2px;
            margin-right: 2px;
        }

        #val-time { font-size: 46px; left: 630px; top: 0px; }
        #val-hypocenter { font-size: 46px; left: 630px; top: 68px; }
        #val-magnitude { font-size: 46px; left: 1228px; top: 0px; }
        #val-depth { font-size: 46px; left: 1228px; top: 68px; }

        #status-banners {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .banner-row { display: flex; gap: 8px; }
        .status-banner { height: 55px; object-fit: contain; transition: opacity 0.3s ease; }
        .status-banner.dimmed { opacity: 0.1 !important; }

        .intensity-icon { background: none; border: none; }
        .intensity-icon img { width: 50px; height: 50px; }

        .epicenter-icon { background: none; border: none; }
        .epicenter-icon img { width: 60px; height: 60px; }
    </style>
</head>
<body>

<div id="display-container">
    <div id="map"></div>

    <div id="header-container">
        <div id="max-intensity-banner"></div>
        
        <div id="val-time" class="info-text-base">--<span class="unit-text">日</span> --<span class="unit-text">時</span>--<span class="unit-text">分ごろ</span></div>
        <div id="val-hypocenter" class="info-text-base">調査中</div>
        <div id="val-magnitude" class="info-text-base">--</div>
        <div id="val-depth" class="info-text-base">--</div>

        <div id="status-banners">
            <img id="banner-tsunami" class="status-banner" src="assets/banner/t2.svg" alt="津波情報">
            <div class="banner-row">
                <img id="banner-eew" class="status-banner dimmed" src="assets/banner/eew.svg" alt="EEW">
                <img id="banner-enchi" class="status-banner dimmed" src="assets/banner/enchi.svg" alt="遠地">
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    function resizeDisplay() {
        const container = document.getElementById('display-container');
        const scaleX = window.innerWidth / 1920;
        const scaleY = window.innerHeight / 1080;
        const scale = Math.min(scaleX, scaleY);
        container.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeDisplay);
    resizeDisplay();

    const map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        minZoom: 2,
        maxZoom: 10
    }).setView([36.5, 138.0], 5);

    // 地図の線の幅やスタイルを管理する設定オブジェクト
    const mapStyles = {
        saibun: {
            weight: 0.8,         // 細分区域の線の幅
            color: "#A6A6A6"
        },
        pref: {
            weight: 1.8,         // 都道府県境界の線の幅
            color: "#595959"
        },
        shionuma: {
            weight: 0,           // 潮沼の線の幅
            color: "none"
        }
    };

    // 優先度（重なり順）マッピング: 震度7が最も高く（前面）、震度1が低く（背面側）なるように設定
    const intensityMap = {
        "10": { banner: "b1.svg", icon: "s1.svg", zIndex: 1000, level: 1 },
        "20": { banner: "b2.svg", icon: "s2.svg", zIndex: 2000, level: 2 },
        "30": { banner: "b3.svg", icon: "s3.svg", zIndex: 3000, level: 3 },
        "40": { banner: "b4.svg", icon: "s4.svg", zIndex: 4000, level: 4 },
        "45": { banner: "b5m.svg", icon: "s5m.svg", zIndex: 5000, level: 5 },
        "50": { banner: "b5p.svg", icon: "s5p.svg", zIndex: 6000, level: 6 },
        "55": { banner: "b6m.svg", icon: "s6m.svg", zIndex: 7000, level: 7 },
        "60": { banner: "b6p.svg", icon: "s6p.svg", zIndex: 8000, level: 8 },
        "70": { banner: "b7.svg", icon: "s7.svg", zIndex: 9000, level: 9 }
    };

    const tsunamiMap = {
        "None": "t2.svg", "Unknown": "t1.svg", "Checking": "t1.svg", "NonEffective": "t3.svg", "Watch": "t4.svg", "Warning": "t4.svg"
    };

    let saibunLayer, prefLayer, shionumaLayer;
    let saibunFeatures = {};
    let shingenMaster = {};    
    let cityToSaibunMap = {};  

    function parseShingenCSV(csvText) {
        const lines = csvText.split(/\r?\n/);
        const result = {};
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            const cols = lines[i].split(',');
            if (cols.length >= 2) {
                result[cols[0].trim()] = cols[1].trim().toUpperCase() === 'TRUE';
            }
        }
        return result;
    }

    function parseObservationCSV(csvText) {
        const lines = csvText.split(/\r?\n/);
        const result = {};
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            const cols = lines[i].split(',');
            if (cols.length >= 2) {
                const saibunName = cols[0].trim(); 
                const cityName = cols[1].trim();   
                
                let prefKey = "";
                
                if (saibunName.includes("伊豆諸島") || saibunName.includes("小笠原")) {
                    prefKey = "東京都";
                } else if (saibunName.startsWith("北海道")) {
                    prefKey = "北海道";
                } else if (saibunName.startsWith("東京")) {
                    prefKey = "東京都";
                } else if (saibunName.startsWith("京都")) {
                    prefKey = "京都府";
                } else if (saibunName.startsWith("大阪")) {
                    prefKey = "大阪府";
                } else {
                    const matchPref = saibunName.match(/^.*?[都道府縣県]/);
                    prefKey = matchPref ? matchPref[0] : saibunName.substring(0, 3);
                }

                if (!result[prefKey]) {
                    result[prefKey] = {};
                }
                result[prefKey][cityName] = saibunName;
            }
        }
        return result;
    }

    async function loadGeoJSON() {
        try {
            const csvRes = await fetch('assets/震央.csv');
            shingenMaster = parseShingenCSV(await csvRes.text());
        } catch (e) { console.error("震央CSV読込失敗:", e); }

        try {
            const obsRes = await fetch('assets/震度観測点.csv');
            cityToSaibunMap = parseObservationCSV(await obsRes.text());
        } catch (e) { console.error("震度観測点CSV読込失敗:", e); }

        try {
            const saibunRes = await fetch('assets/map/saibun.json');
            const saibunData = await saibunRes.json();
            
            saibunData.features.forEach(f => {
                if (f.properties) {
                    const rawName = f.properties.name || f.properties.NAME || f.properties.name_ja;
                    if (rawName) {
                        const cleanedName = rawName.toString().trim();
                        saibunFeatures[cleanedName] = f;
                    }
                }
            });

            saibunLayer = L.geoJSON(saibunData, {
                style: { color: mapStyles.saibun.color, weight: mapStyles.saibun.weight, fillColor: "#BFBFBF", fillOpacity: 1.0 }
            }).addTo(map);

            prefLayer = L.geoJSON(await (await fetch('assets/map/pref.json')).json(), {
                style: { color: mapStyles.pref.color, weight: mapStyles.pref.weight, fillColor: "none", fillOpacity: 0 }
            }).addTo(map);

            shionumaLayer = L.geoJSON(await (await fetch('assets/map/shionuma.json')).json(), {
                style: { color: mapStyles.shionuma.color, weight: mapStyles.shionuma.weight, fillColor: "#143264", fillOpacity: 1.0 }
            }).addTo(map);
        } catch (e) { console.error("GeoJSON読込失敗:", e); }
    }

    function getFeatureCenter(feature) {
        if (feature.geometry.type === "Point") {
            return [feature.geometry.coordinates[1], feature.geometry.coordinates[0]];
        }
        const tempLayer = L.geoJSON(feature);
        const center = tempLayer.getBounds().getCenter();
        return [center.lat, center.lng];
    }

    function convertToSaibunNameWithPref(prefName, addrName) {
        if (!prefName || !addrName) return null;

        if (prefName === "東京都") {
            if (addrName.includes("大島町")) {
                return "伊豆大島"; 
            }
            if (addrName.includes("利島村") || addrName.includes("新島村")) {
                return "新島"; 
            }
            if (addrName.includes("神津島村")) {
                return "神津島"; 
            }
            if (addrName.includes("三宅村") || addrName.includes("御蔵島村")) {
                return "三宅島"; 
            }
            if (addrName.includes("八丈町") || addrName.includes("青ヶ島村")) {
                return "八丈島"; 
            }
            if (addrName.includes("小笠原村")) {
                return "小笠原諸島";
            }
            if (addrName.includes("東京国際空港") || addrName.includes("羽田")) {
                return "東京都２３区";
            }
        }
        if (prefName === "千葉県" && (addrName.includes("成田国際空港") || addrName.includes("成田空港"))) {
            return "千葉県北東部";
        }

        const prefMaster = cityToSaibunMap[prefName];
        if (!prefMaster) return null;

        if (prefMaster[addrName]) return prefMaster[addrName];

        let cleanedAddr = addrName;
        if (addrName.startsWith(prefName)) {
            cleanedAddr = addrName.substring(prefName.length);
        } else {
            const shortPref = prefName.replace(/[都府県]$/, '');
            if (addrName.startsWith(shortPref)) {
                cleanedAddr = addrName.substring(shortPref.length);
            }
        }

        const match = cleanedAddr.match(/^.*?(?:筑西市|つくばみらい市|いちき串木野市|かすみがうら市|ひたちなか市|むつ市|さいたま市|国際空港|空港|［.*?］|市|町|村|区)/);
        const baseCityName = match ? match[0] : cleanedAddr;
        
        if (prefMaster[baseCityName]) return prefMaster[baseCityName];

        for (const cityKey in prefMaster) {
            if (cleanedAddr.endsWith(cityKey) || 
                baseCityName === cityKey || 
                cityKey.includes(baseCityName) || 
                baseCityName.includes(cityKey)) {
                return prefMaster[cityKey];
            }
        }
        return null;
    }

    async function fetchQuakeData() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const apiUrl = "https://api.p2pquake.net/v2/history?codes=551&limit=30";
        
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            if (!data || data.length === 0) return;

            let eq = data[0];
            if (targetId) {
                const found = data.find(item => item.id === targetId);
                if (found) eq = found;
            }
            await renderEarthquake(eq);
        } catch (e) { console.error("API取得失敗:", e); }
    }

    async function checkEEW(targetTimeStr) {
        if (!targetTimeStr) return false;
        try {
            const eewRes = await fetch("https://api.p2pquake.net/v2/history?codes=556&limit=10");
            const eewData = await eewRes.json();
            if (!eewData || eewData.length === 0) return false;
            const targetMinute = targetTimeStr.substring(0, 16);
            return eewData.some(eew => eew.earthquake && eew.earthquake.originTime && eew.earthquake.originTime.substring(0, 16) === targetMinute);
        } catch (err) { return false; }
    }

    async function renderEarthquake(eq) {
        const earth = eq.earthquake;
        const points = eq.points || [];
        const hypocenterName = earth.hypocenter.name || "震源不詳";
        
        let epicenterLat = earth.hypocenter.latitude;
        let epicenterLng = earth.hypocenter.longitude;
        let hasEpicenter = (epicenterLat !== -1 && epicenterLng !== -1);

        if (earth.time) {
            const t = earth.time.split(' ');
            if (t.length >= 2) {
                const dateParts = t[0].split('/');
                const timeParts = t[1].split(':');
                document.getElementById('val-time').innerHTML = `${dateParts[2]}<span class="unit-text">日</span> ${timeParts[0]}<span class="unit-text">時</span>${timeParts[1]}<span class="unit-text">分ごろ</span>`;
            }
        }
        
        document.getElementById('val-hypocenter').innerText = hypocenterName;
        document.getElementById('val-magnitude').innerText = earth.hypocenter.magnitude === -1 ? "Ｍ不定" : `Ｍ${earth.hypocenter.magnitude}`;
        
        if (earth.hypocenter.depth > 0) {
            document.getElementById('val-depth').innerHTML = `<span class="unit-text">約</span>${earth.hypocenter.depth}km`;
        } else {
            document.getElementById('val-depth').innerText = earth.hypocenter.depth === -1 ? "深さ不明" : "ごく浅い";
        }

        const maxInt = earth.maxScale;
        document.getElementById('max-intensity-banner').style.backgroundImage = `url('assets/banner/${intensityMap[maxInt] ? intensityMap[maxInt].banner : 'b0.svg'}')`;

        const domesticTsunami = earth.domesticTsunami || "None";
        document.getElementById('banner-tsunami').src = `assets/banner/${tsunamiMap[domesticTsunami] || 't2.svg'}`;

        const isEnchi = shingenMaster[hypocenterName] === true || hypocenterName.includes("遠地") || domesticTsunami === "Checking" || maxInt === 0;
        if (isEnchi) document.getElementById('banner-enchi').classList.remove('dimmed');
        else document.getElementById('banner-enchi').classList.add('dimmed');

        if (await checkEEW(earth.time)) document.getElementById('banner-eew').classList.remove('dimmed');
        else document.getElementById('banner-eew').classList.add('dimmed');

        // 震源ピンの配置
        if (hasEpicenter) {
            L.marker([epicenterLat, epicenterLng], {
                icon: L.divIcon({ className: 'epicenter-icon', html: `<img src="assets/icons/shingen.png" alt="震源地">`, iconSize: [60, 60], iconAnchor: [30, 30] }),
                pane: 'markerPane'
            }).addTo(map).setZIndexOffset(50);
        }

        const saibunMaxScale = {};
        points.forEach(p => {
            const prefName = p.pref; 
            const addrName = p.addr; 
            const scale = p.scale;

            const saibunName = convertToSaibunNameWithPref(prefName, addrName);
            if (saibunName) {
                const targetKey = saibunName.trim();
                if (saibunFeatures[targetKey]) {
                    if (!saibunMaxScale[targetKey] || scale > saibunMaxScale[targetKey]) {
                        saibunMaxScale[targetKey] = scale;
                    }
                }
            }
        });

        // ズーム範囲計算用の座標リスト
        let zoomBoundsPoints = [];

        // 各細分区域に震度ピンをマッピングし、最大震度エリアをズーム対象として集計
        for (const saibunName in saibunMaxScale) {
            const finalScale = saibunMaxScale[saibunName];
            if (intensityMap[finalScale]) {
                const center = getFeatureCenter(saibunFeatures[saibunName]);
                
                L.marker(center, {
                    icon: L.divIcon({ className: 'intensity-icon', html: `<img src="assets/icons/${intensityMap[finalScale].icon}" alt="震度${finalScale}">`, iconSize: [50, 50], iconAnchor: [25, 25] }),
                    pane: 'markerPane'
                }).addTo(map).setZIndexOffset(intensityMap[finalScale].zIndex);

                // 今回の地震の「最大震度（maxInt）」と同じ震度を観測した地域のみをズーム対象の計算に含める
                if (finalScale === maxInt) {
                    zoomBoundsPoints.push(center);
                }
            }
        }

        // ズーム処理
        if (isEnchi) {
            map.setView([36.5, 138.0], 5);
        } else if (hasEpicenter) {
            // 最大震度を観測した地域がある場合
            if (zoomBoundsPoints.length > 0) {
                // 最大震度エリアの座標リストに、必ず「震源地」も含めることで画面内に収まるように保証する
                let targetPoints = [...zoomBoundsPoints];
                targetPoints.push([epicenterLat, epicenterLng]);

                map.fitBounds(L.latLngBounds(targetPoints), { 
                    paddingTopLeft: [190, 40],  
                    paddingBottomRight: [40, 40], 
                    maxZoom: 10
                });
            } else {
                // 最大震度データがうまく取れなかった等のフォールバック
                map.setView([epicenterLat, epicenterLng], 7);
            }
        }
    }

    window.addEventListener('keydown', function(event) {
        if (event.key === 'ArrowUp') {
            map.zoomIn();
            event.preventDefault();
        } else if (event.key === 'ArrowDown') {
            map.zoomOut();
            event.preventDefault();
        }
    });

    async function init() {
        await loadGeoJSON();
        await fetchQuakeData();
    }

    init();
</script>
</body>
</html>
