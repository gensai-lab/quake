<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震情報</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @font-face {
            font-family: 'UDKakugo';
            src: url('assets/fonts/FOT-UDKakugo_LargePr6-DB.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'UDKakugo', sans-serif;
            background-color: #0d1b2a;
            overflow: hidden;
            user-select: none;
        }

        /* 16:9 画面比率の固定コンテナ（スクショ用） */
        #display-container {
            position: relative;
            width: 1920px;
            height: 1080px;
            transform-origin: top left;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #0b132b;
        }

        /* 上部ヘッダー（assets/back.svg を背景に指定） */
        #header-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 150px;
            background-image: url('assets/back.svg');
            background-size: cover;
            background-repeat: no-repeat;
            z-index: 1000;
            display: flex;
            align-items: center;
        }

        /* 左上 震度バナーエリア */
        #max-intensity-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 490px;
            height: 150px;
            background-size: contain;
            background-repeat: no-repeat;
        }

        /* 動的テキスト情報エリア */
        #info-text-area {
            position: absolute;
            left: 510px;
            top: 0;
            height: 150px;
            width: 1000px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-value {
            font-size: 38px;
            font-weight: bold;
        }

        /* 右上 ステータスバナーエリア */
        #status-banners {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .status-banner {
            height: 55px;
            object-fit: contain;
        }

        /* カスタム震度アイコンスタイル */
        .intensity-icon {
            background: none;
            border: none;
        }
        .intensity-icon img {
            width: 50px;
            height: 50px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.6));
        }
    </style>
</head>
<body>

<div id="display-container">
    <div id="map"></div>

    <div id="header-container">
        <div id="max-intensity-banner"></div>
        
        <div id="info-text-area">
            <div class="info-item">
                <span class="info-value" id="val-time">--日 --時--分ごろ</span>
            </div>
            <div class="info-item">
                <span class="info-value" id="val-hypocenter">調査中</span>
            </div>
            <div class="info-item">
                <span class="info-value" id="val-magnitude">--</span>
            </div>
            <div class="info-item">
                <span class="info-value" id="val-depth">--</span>
            </div>
        </div>

        <div id="status-banners">
            <img id="banner-tsunami" class="status-banner" src="assets/banner/t1.svg" alt="津波情報">
            <img id="banner-eew" class="status-banner" src="assets/banner/eew.svg" alt="EEW" style="display: none;">
            <img id="banner-enchi" class="status-banner" src="assets/banner/enchi.svg" alt="遠地" style="display: none;">
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 画面のリサイズ対応（1920x1080を基準に等倍スケーリング）
    function resizeDisplay() {
        const container = document.getElementById('display-container');
        const scaleX = window.innerWidth / 1920;
        const scaleY = window.innerHeight / 1080;
        const scale = Math.min(scaleX, scaleY);
        container.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resizeDisplay);
    resizeDisplay();

    // Leafletマップ初期化
    const map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        minZoom: 2,
        maxZoom: 10
    }).setView([36.5, 138.0], 5); // デフォルトは日本中心

    // 震度・津波の各種マッピング設定
    const intensityMap = {
        "10": { banner: "b1.svg", icon: "s1.svg" },
        "20": { banner: "b2.svg", icon: "s2.svg" },
        "30": { banner: "b3.svg", icon: "s3.svg" },
        "40": { banner: "b4.svg", icon: "s4.svg" },
        "45": { banner: "b5m.svg", icon: "s5m.svg" }, // 5弱
        "50": { banner: "b5p.svg", icon: "s5p.svg" }, // 5強
        "55": { banner: "b6m.svg", icon: "s6m.svg" }, // 6弱
        "60": { banner: "b6p.svg", icon: "s6p.svg" }, // 6強
        "70": { banner: "b7.svg", icon: "s7.svg" }
    };

    const tsunamiMap = {
        "None": "t2.svg",
        "Unknown": "t1.svg",
        "Checking": "t1.svg",
        "NonEffective": "t3.svg",
        "Watch": "t4.svg",
        "Warning": "t4.svg"
    };

    // GeoJSONレイヤー用変数
    let saibunLayer, prefLayer, shionumaLayer;

    // 各種マッピング用の重心データ（細分区域用）
    let saibunFeatures = {};

    // 1. GeoJSONデータの読み込み
    async function loadGeoJSON() {
        try {
            // 都道府県
            const prefRes = await fetch('assets/map/pref.json');
            const prefData = await prefRes.json();
            prefLayer = L.geoJSON(prefData, {
                style: { color: "#4a5568", weight: 1.5, fillOpacity: 0.1, fillColor: "#1a202c" }
            }).addTo(map);

            // 潮沼
            const shionumaRes = await fetch('assets/map/shionuma.json');
            const shionumaData = await shionumaRes.json();
            shionumaLayer = L.geoJSON(shionumaData, {
                style: { color: "#2b6cb0", weight: 1, fillOpacity: 0.2, fillColor: "#2b6cb0" }
            }).addTo(map);

            // 細分区域
            const saibunRes = await fetch('assets/map/saibun.json');
            const saibunData = await saibunRes.json();
            
            // 後で震度アイコンをプロットするためにオブジェクト化
            saibunData.features.forEach(f => {
                if (f.properties && f.properties.name) {
                    saibunFeatures[f.properties.name] = f;
                }
            });

            saibunLayer = L.geoJSON(saibunData, {
                style: { color: "#718096", weight: 0.8, fillOpacity: 0 }
            }).addTo(map);

        } catch (e) {
            console.error("GeoJSONの読み込みに失敗しました:", e);
        }
    }

    // 多角形（Polygon/MultiPolygon）の重心または代表点を簡易計算
    function getFeatureCenter(feature) {
        if (feature.geometry.type === "Point") {
            return feature.geometry.coordinates;
        }
        // Leafletのレイヤー化を利用して境界の中心を取得
        const tempLayer = L.geoJSON(feature);
        return tempLayer.getBounds().getCenter();
    }

    // 2. P2P地震情報APIからデータ取得・描画
    async function fetchQuakeData() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        
        const apiUrl = "https://api.p2pquake.net/v2/history?codes=551&limit=30";
        
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            if (!data || data.length === 0) return;

            // 特定IDの指定があればそれを選択、なければ最新(0番目)を選択
            let eq = data[0];
            if (targetId) {
                const found = data.find(item => item.id === targetId);
                if (found) eq = found;
            }

            renderEarthquake(eq);
        } catch (e) {
            console.error("APIの取得に失敗しました:", e);
        }
    }

    // 3. 地震データのレンダリング
    function renderEarthquake(eq) {
        const earth = eq.earthquake;
        const points = eq.points || [];

        // --- ヘッダー情報の更新 ---
        // 発生時刻のパース (YYYY/MM/DD HH:mm:ss -> DD日 HH時mm分ごろ)
        if (earth.time) {
            const t = earth.time.split(' ');
            if (t.length >= 2) {
                const dateParts = t[0].split('/');
                const timeParts = t[1].split(':');
                document.getElementById('val-time').innerText = `${dateParts[2]}日 ${timeParts[0]}時${timeParts[1]}分ごろ`;
            }
        }
        
        document.getElementById('val-hypocenter').innerText = earth.hypocenter.name || "震源不詳";
        document.getElementById('val-magnitude').innerText = earth.hypocenter.magnitude === -1 ? "Ｍ不定" : `Ｍ${earth.hypocenter.magnitude}`;
        
        let depthStr = "ごく浅い";
        if (earth.hypocenter.depth > 0) depthStr = `約${earth.hypocenter.depth}km`;
        if (earth.hypocenter.depth === -1) depthStr = "深さ不明";
        document.getElementById('val-depth').innerText = depthStr;

        // --- バナーコントロール ---
        // 最大震度バナー
        const maxInt = earth.maxScale;
        const bannerContainer = document.getElementById('max-intensity-banner');
        if (intensityMap[maxInt]) {
            bannerContainer.style.backgroundImage = `url('assets/banner/${intensityMap[maxInt].banner}')`;
        } else {
            bannerContainer.style.backgroundImage = `url('assets/banner/b0.svg')`;
        }

        // 津波バナー
        const tsunamiDom = document.getElementById('banner-tsunami');
        const domesticTsunami = earth.domesticTsunami || "None";
        if (tsunamiMap[domesticTsunami]) {
            tsunamiDom.src = `assets/banner/${tsunamiMap[domesticTsunami]}`;
            tsunamiDom.style.display = "block";
        }

        // 遠地地震判定（震源地が遠地、または国内の最大震度が設定されていない等）
        const enchiDom = document.getElementById('banner-enchi');
        if (earth.hypocenter.name.includes("遠地") || domesticTsunami === "Checking" || maxInt === 0) {
            enchiDom.style.display = "block";
            // 遠地の場合は世界地図が見えるようにズームアウト
            map.setView([20, 140], 3);
        } else {
            enchiDom.style.display = "none";
        }

        // --- 震央マッピング (X印) ---
        if (earth.hypocenter.latitude !== -1 && earth.hypocenter.longitude !== -1) {
            const epicenterIcon = L.divIcon({
                className: 'epicenter-mark',
                html: `<b style="color:#ff0000; font-size:42px; text-shadow: 0 0 6px #fff, 0 0 6px #fff;">×</b>`,
                iconSize: [40, 40],
                iconAnchor: [20, 26]
            });
            L.marker([earth.hypocenter.latitude, earth.hypocenter.longitude], { icon: epicenterIcon }).addTo(map);
            
            // 遠地でなければ震源地を中心にフィット
            if (!earth.hypocenter.name.includes("遠地")) {
                map.panTo([earth.hypocenter.latitude, earth.hypocenter.longitude]);
            }
        }

        // --- 震度アイコンのマッピング ---
        points.forEach(p => {
            const saibunName = p.addr; // P2P地震情報の細分区域名
            const scale = p.scale;

            if (saibunFeatures[saibunName] && intensityMap[scale]) {
                const center = getFeatureCenter(saibunFeatures[saibunName]);
                
                const iconPath = `assets/icons/${intensityMap[scale].icon}`;
                const icon = L.divIcon({
                    className: 'intensity-icon',
                    html: `<img src="${iconPath}" alt="震度${scale}">`,
                    iconSize: [50, 50],
                    iconAnchor: [25, 25]
                });

                L.marker(center, { icon: icon }).addTo(map);
            }
        });
    }

    // 初期化シーケンス
    async function init() {
        await loadGeoJSON();
        await fetchQuakeData();
    }

    init();
</script>
</body>
</html>
